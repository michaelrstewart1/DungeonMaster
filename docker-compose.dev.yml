services:
  postgres:
    image: postgres:16
    container_name: dm-postgres
    environment:
      POSTGRES_USER: dungeonmaster
      POSTGRES_PASSWORD: dungeonmaster
      POSTGRES_DB: dungeonmaster
    ports:
      - "5432:5432"
    volumes:
      - dm-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dungeonmaster"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: ghcr.io/5e-bits/5e-database:latest
    container_name: dm-mongodb
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dm-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dm-postgres-data:
